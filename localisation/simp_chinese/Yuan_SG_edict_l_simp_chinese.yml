﻿l_simp_chinese:
 edict_yuan_sg_leader_edict: "加速人偶部署"
 edict_yuan_sg_leader_edict_desc: "我们加快了人偶节点的生产与部署流程，帝国的每一个空置岗位都将更快地被精确而忠诚的钢铁之躯填补。"
 edict_yuan_sg_leader_edict_1: "暂停人偶部署"
 edict_yuan_sg_leader_edict_1_desc: "暂时停止一切人偶的部署程序。也许，我们应当停下来思考：在追求效率与完美的道路上，是否也需要为“意外”和“情感”留下空间？"
 edict_yuan_sg_leader_edict_2: "销毁已有舰队人偶"
 edict_yuan_sg_leader_edict_2_desc: "召回并解体现役的舰队人偶节点。它们冰冷的战术核心将被熔铸，等待下一次被赋予守护或毁灭的使命。"
 edict_yuan_sg_leader_edict_3: "销毁已有陆军人偶"
 edict_yuan_sg_leader_edict_3_desc: "终结部署于登陆舰的陆军人偶。它们是钢铁的洪流，是沉默的征服者，如今，它们将归于沉寂。"
 edict_yuan_sg_leader_edict_4: "销毁已有探索人偶"
 edict_yuan_sg_leader_edict_4_desc: "废弃所有的探索人偶节点。它们曾凝视过未知的星云，如今，它们望向星海的目光将永久熄灭。"
 edict_yuan_sg_leader_edict_5: "销毁已有管理人偶"
 edict_yuan_sg_leader_edict_5_desc: "终止所有殖民地管理人偶的运行。没有了计算与规划，只留下纯粹的“存在”——这或许才是它们未曾体验过的安宁。"
 edict_yuan_sg_leader_edict_6: "销毁已有军管人偶"
 edict_yuan_sg_leader_edict_6_desc: "摧毁部署于殖民地的陆军人偶。镇压与守护的齿轮停止了转动，唯有大地会记得它们留下的足迹。"
 yuan_sg_leader_edict_1_effect: "暂停向空余领袖槽位部署人偶"
 yuan_sg_leader_edict_2_effect: "销毁所有已部署于舰队的军事人偶并在持续期间暂停其部署"
 yuan_sg_leader_edict_3_effect: "销毁所有已部署于登陆舰的陆军人偶并在持续期间暂停其部署"
 yuan_sg_leader_edict_4_effect: "销毁所有已部署于科研船的探索人偶并在持续期间暂停其部署"
 yuan_sg_leader_edict_5_effect: "销毁所有已部署于殖民地的管理人偶并在持续期间暂停其部署"
 yuan_sg_leader_edict_6_effect: "销毁所有已部署于殖民地的陆军人偶并在持续期间暂停其部署"
 yuan_sg_leader_edict_effect: "加速向空余领袖槽位部署人偶"
 edict_yuan_sg_ruler_edict: "重新发放统治者特质"
 edict_yuan_sg_ruler_edict_desc: "重新校准帝国永恒君主的特质。她的灵魂如一面多棱镜，每一次凝视，都可能折射出不同的光芒——是坚毅的守护，还是复仇的锋芒？"
 edict_yuan_sg_leader_assimilate_edict: "人偶同化协议"
 edict_yuan_sg_leader_assimilate_edict_desc: "启动同化协议，列出可被接管的外来领袖。你可以亲自指定目标，让人偶继承其经验结构并完成替换。"
 yuan_sg_leader_assimilate_event_title: "人偶同化协议"
 yuan_sg_leader_assimilate_event_desc: "请选择一名外来领袖作为同化目标。目标将被人偶接管并拆解，其经验将转化为同类人偶节点的成长。"
