﻿l_simp_chinese:
 leader_trait_sg_orthis: "无垠世界"
 leader_trait_sg_orthis_desc: "一个人学习得越多，就越容易意识到真正的知识需要经验——善良、温暖和爱。愤怒、悲伤和仇恨。即使是相同的现象，对其他人来说也表现不同。有多少心去感受它们，就有多少种情感。\n\n§Y——奥契丝，永恒帝国的第一具人偶，也是唯一的统治者。§!"
 leader_trait_sg_artifact: "人偶之心"
 leader_trait_sg_artifact_desc: "什么使人类完整？答案从未找到。无论如何，他们继续生产。\n\n这是一具拥有“心”的人偶。她的灵魂在帝国的每一个钢铁子民间流转，感受着每一份忠诚、困惑，与无声的爱。她的伙伴，魔像“洛伊德”，永远忠实地守护在她的身侧。"